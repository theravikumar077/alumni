<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - AlumniHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

  <!-- Sticky Navbar -->
  <header id="navbar-container"></header>

  <!-- Messaging Layout -->
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col h-[calc(100vh-4rem)]">
    <div class="flex-1 flex rounded-3xl glass border border-slate-200/50 dark:border-slate-800/80 overflow-hidden shadow-2xl">
      <!-- Inbox Sidebar -->
      <aside class="w-full md:w-80 border-r border-slate-200/50 dark:border-slate-800/80 flex flex-col bg-slate-50/20 dark:bg-slate-900/10">
        <div class="p-4 border-b border-slate-200/50 dark:border-slate-800/80">
          <h2 class="font-extrabold text-lg flex items-center gap-2"><i class="fa-solid fa-inbox text-indigo-500"></i> Direct Chats</h2>
        </div>
        
        <div id="chats-list" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1">
          <!-- Chat list loaded dynamically -->
          <div class="skeleton h-16 rounded-xl"></div>
          <div class="skeleton h-16 rounded-xl"></div>
        </div>
      </aside>

      <!-- Active Chat pane -->
      <section class="hidden md:flex flex-1 flex-col" id="active-chat-pane">
        <!-- Chat Header -->
        <header class="p-4 border-b border-slate-200/50 dark:border-slate-800/80 flex items-center justify-between bg-slate-50/30 dark:bg-slate-900/20">
          <div class="flex items-center gap-3">
            <img id="chat-header-avatar" src="https://via.placeholder.com/40" alt="Avatar" class="w-10 h-10 rounded-full object-cover">
            <div>
              <h3 id="chat-header-name" class="font-bold text-slate-800 dark:text-slate-100">Select a Chat</h3>
              <p class="text-[10px] text-emerald-500 font-semibold flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Active Partner</p>
            </div>
          </div>
        </header>

        <!-- Message logs stream -->
        <div id="messages-log" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 bg-slate-55/10 dark:bg-slate-950/10">
          <!-- Chat logs -->
          <div class="text-center text-slate-400 py-20">Select an active contact from the left panel to begin messaging.</div>
        </div>

        <!-- Composer Form -->
        <footer class="p-4 border-t border-slate-200/50 dark:border-slate-800/80 bg-slate-50/30 dark:bg-slate-900/20">
          <form id="composer-form" onsubmit="sendMessagePayload(event)" class="flex gap-2 items-center">
            <input type="text" id="composer-input" autocomplete="off" required class="flex-1 px-4 py-3 rounded-xl glass-input text-sm text-slate-850 dark:text-slate-200" placeholder="Type a message...">
            <button type="submit" class="px-5 py-3 text-sm font-semibold text-white bg-indigo-600 dark:bg-violet-600 hover:bg-indigo-700 dark:hover:bg-violet-700 rounded-xl transition shadow-sm">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </form>
        </footer>
      </section>

      <!-- Active Chat Placeholder (visible on desktop when no chat selected) -->
      <section class="hidden md:flex flex-1 flex-col items-center justify-center gap-4 text-center p-8" id="chat-pane-placeholder">
        <span class="p-6 bg-indigo-50 dark:bg-slate-900 text-slate-400 rounded-full text-4xl"><i class="fa-regular fa-comment-dots"></i></span>
        <h3 class="text-xl font-bold">Your Inbox</h3>
        <p class="text-xs text-slate-400 max-w-xs">Select an alumni, mentor, or student peer from your sidebar inbox list or click 'Message' on their profiles.</p>
      </section>
    </div>
  </main>

  <!-- App Main Scripts -->
  <script src="/js/app.js"></script>

  <script>
    let activeChatUserId = null;
    let pollInterval = null;

    function pageInit() {
      // Check for URL query "?chat=userId"
      const urlParams = new URLSearchParams(window.location.search);
      const chatWithId = urlParams.get("chat");
      
      loadChatsList().then(() => {
        if (chatWithId) {
          selectChat(chatWithId);
        }
      });

      // Periodically refresh chat list and history
      pollInterval = setInterval(() => {
        loadChatsList(false);
        if (activeChatUserId) {
          fetchHistory(activeChatUserId, false);
        }
      }, 4000);
    }

    // Cleanup interval on page unload
    window.addEventListener("beforeunload", () => {
      clearInterval(pollInterval);
    });

    async function loadChatsList(showLoading = true) {
      const container = document.getElementById("chats-list");
      if (showLoading) {
        container.innerHTML = createSkeleton(2);
      }

      try {
        const res = await fetch("/api/messages/chats");
        const data = await res.json();

        if (data.success && data.data.length > 0) {
          container.innerHTML = data.data.map(chat => {
            const partner = chat.user;
            const isUnread = !chat.isRead;
            const isActive = activeChatUserId === partner._id;

            return `
              <button onclick="selectChat('${partner._id}')" class="w-full flex items-center gap-3 p-3 rounded-2xl text-left transition ${
                isActive 
                  ? "bg-indigo-50 dark:bg-violet-950/40 border border-indigo-200/30" 
                  : "hover:bg-slate-100/50 dark:hover:bg-slate-800/40 border border-transparent"
              }">
                <div class="relative flex-shrink-0">
                  <img src="${partner.avatar || 'https://via.placeholder.com/40'}" alt="Avatar" class="w-11 h-11 rounded-full object-cover">
                  ${isUnread ? `<span class="absolute top-0 right-0 w-3 h-3 bg-rose-500 rounded-full border-2 border-slate-50 dark:border-slate-900 animate-ping"></span>` : ""}
                </div>
                
                <div class="flex-1 min-w-0">
                  <div class="flex justify-between items-baseline mb-0.5">
                    <h4 class="font-bold text-xs text-slate-800 dark:text-slate-100 truncate">${partner.name}</h4>
                    <span class="text-[9px] text-slate-400 font-semibold">${new Date(chat.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                  </div>
                  <p class="text-[11px] text-slate-500 dark:text-slate-400 truncate ${isUnread ? 'font-black text-slate-800 dark:text-slate-100' : ''}">
                    ${chat.lastMessage}
                  </p>
                </div>
              </button>
            `;
          }).join("");
        } else if (!showLoading) {
          // Keep contents
        } else {
          container.innerHTML = `<div class="p-4 text-center text-xs text-slate-400">No active chats. Start one from a profile!</div>`;
        }
      } catch (err) {
        console.error("Load chats error:", err);
      }
    }

    async function selectChat(partnerId) {
      activeChatUserId = partnerId;

      // Toggle views
      document.getElementById("chat-pane-placeholder").classList.add("hidden");
      const activePane = document.getElementById("active-chat-pane");
      activePane.classList.remove("hidden");
      activePane.classList.add("flex");

      // Load partner profile info
      try {
        const userRes = await fetch(`/api/alumni/${partnerId}`);
        const userData = await userRes.json();
        if (userData.success) {
          document.getElementById("chat-header-name").innerText = userData.user.name;
          document.getElementById("chat-header-avatar").src = userData.user.avatar;
        }
      } catch (err) {
        console.error("Load partner details error:", err);
      }

      fetchHistory(partnerId, true);
      loadChatsList(false); // update highlighting and read dots
    }

    async function fetchHistory(partnerId, autoScroll = false) {
      const logs = document.getElementById("messages-log");

      try {
        const res = await fetch(`/api/messages/history/${partnerId}`);
        const data = await res.json();

        if (data.success) {
          const atBottomBefore = logs.scrollHeight - logs.scrollTop <= logs.clientHeight + 100;

          logs.innerHTML = data.data.map(msg => {
            const isMe = msg.sender._id.toString() === (currentUser.id || currentUser._id).toString();
            
            return `
              <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                <div class="flex gap-2 max-w-[70%] ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                  <img src="${msg.sender.avatar}" alt="Avatar" class="w-7 h-7 rounded-full object-cover flex-shrink-0 mt-0.5">
                  <div class="p-3 rounded-2xl text-xs leading-relaxed ${
                    isMe 
                      ? 'bg-indigo-600 dark:bg-violet-600 text-white rounded-tr-none' 
                      : 'bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-tl-none border border-slate-200/30 dark:border-slate-800/80'
                  }">
                    <p class="whitespace-pre-wrap">${msg.content}</p>
                    <p class="text-[8px] text-right mt-1.5 opacity-60">${new Date(msg.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                  </div>
                </div>
              </div>
            `;
          }).join("");

          if (autoScroll || atBottomBefore) {
            logs.scrollTop = logs.scrollHeight;
          }
        }
      } catch (err) {
        console.error("Fetch history error:", err);
      }
    }

    async function sendMessagePayload(e) {
      e.preventDefault();
      
      const input = document.getElementById("composer-input");
      const content = input.value;
      if (!content || !activeChatUserId) return;

      try {
        const res = await fetch("/api/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ receiverId: activeChatUserId, content })
        });
        const data = await res.json();

        if (data.success) {
          input.value = "";
          fetchHistory(activeChatUserId, true);
          loadChatsList(false);
        } else {
          showToast(data.message || "Failed to send message", "error");
        }
      } catch (err) {
        showToast("Error sending message payload", "error");
      }
    }
  </script>
</body>
</html>
