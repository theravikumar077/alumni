<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs Board - AlumniHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

  <!-- Sticky Navbar -->
  <header id="navbar-container"></header>

  <!-- Main Content Layout -->
  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <div class="flex flex-col gap-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-black">Careers & Internships</h1>
          <p class="text-xs text-slate-400 mt-1">Explore job postings shared directly by verified alumni at top tech firms.</p>
        </div>
        
        <!-- Post a Job Button (Visible to Alumni, Mentor, Admin) -->
        <button id="post-job-btn" onclick="openJobModal()" class="px-5 py-3 text-sm font-semibold text-white bg-indigo-600 dark:bg-violet-600 hover:bg-indigo-700 dark:hover:bg-violet-700 rounded-2xl transition shadow-md hidden">
          <i class="fa-solid fa-plus mr-1.5"></i> Post a Job
        </button>
      </div>

      <!-- Search, Type, and Location Panel -->
      <div class="glass p-6 rounded-3xl border border-slate-200/50 dark:border-slate-800/80 flex flex-col md:flex-row gap-4">
        <!-- Search Keyword -->
        <div class="flex-1 relative">
          <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input type="text" id="job-search" oninput="debounceFetch()" class="w-full pl-10 pr-4 py-3 rounded-2xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="Search by job title, company, skills...">
        </div>
        <!-- Location filter -->
        <div class="w-full md:w-60 relative">
          <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400"><i class="fa-solid fa-location-dot"></i></span>
          <input type="text" id="job-location" oninput="debounceFetch()" class="w-full pl-10 pr-4 py-3 rounded-2xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="Location...">
        </div>
        <!-- Type select filter -->
        <div class="w-full md:w-52 relative">
          <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400"><i class="fa-solid fa-briefcase"></i></span>
          <select id="job-type" onchange="fetchJobs()" class="w-full pl-10 pr-4 py-3 rounded-2xl glass-input text-sm text-slate-800 dark:text-slate-200 appearance-none">
            <option value="">All Job Types</option>
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Internship">Internship</option>
            <option value="Contract">Contract</option>
          </select>
        </div>
      </div>

      <!-- Jobs List Grid -->
      <div id="jobs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Skeleton loaders -->
      </div>
      
      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-20 flex flex-col items-center gap-4">
        <span class="p-5 bg-indigo-50 dark:bg-slate-900 text-slate-400 rounded-full text-4xl"><i class="fa-solid fa-folder-open"></i></span>
        <h3 class="text-xl font-bold">No Openings Found</h3>
        <p class="text-xs text-slate-400 max-w-sm">Try broadening your search term or select all job types.</p>
      </div>
    </div>
  </main>

  <!-- Post Job Modal -->
  <div id="job-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/40 backdrop-blur-sm hidden">
    <div class="max-w-md w-full rounded-3xl glass p-6 border border-slate-200/50 dark:border-slate-800/80 shadow-2xl relative animate-float">
      <!-- Close button -->
      <button onclick="closeJobModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 focus:outline-none">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>

      <h3 class="text-xl font-extrabold mb-4 text-slate-800 dark:text-slate-100 flex items-center gap-2">
        <i class="fa-solid fa-briefcase text-indigo-500"></i> Post Career Opportunity
      </h3>

      <form id="job-form" onsubmit="submitJob(event)" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-450 uppercase mb-1.5">Job Title</label>
          <input type="text" id="post-title" required class="w-full px-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="e.g. Frontend developer">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-450 uppercase mb-1.5">Company Name</label>
          <input type="text" id="post-company" required class="w-full px-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="e.g. Stripe">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-450 uppercase mb-1.5">Description & Requirements</label>
          <textarea id="post-desc" rows="3" required class="w-full px-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="Provide job details, requirements, tools needed..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-450 uppercase mb-1.5">Location</label>
            <input type="text" id="post-location" required class="w-full px-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="e.g. Remote or Boston, MA">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-450 uppercase mb-1.5">Job Type</label>
            <select id="post-type" required class="w-full px-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200">
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Internship">Internship</option>
              <option value="Contract">Contract</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-450 uppercase mb-1.5">Salary Package</label>
            <input type="text" id="post-salary" class="w-full px-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="e.g. $100k - $120k">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-450 uppercase mb-1.5">Keywords / Tags (comma split)</label>
            <input type="text" id="post-tags" class="w-full px-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="e.g. node, coding, design">
          </div>
        </div>

        <button type="submit" class="w-full py-3.5 text-sm font-semibold text-white bg-indigo-600 dark:bg-violet-600 hover:bg-indigo-700 dark:hover:bg-violet-700 rounded-xl transition duration-200 shadow-md">
          Publish Posting
        </button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer id="footer-container" class="mt-auto"></footer>

  <!-- App Main Scripts -->
  <script src="/js/app.js"></script>

  <script>
    let debounceTimer;

    function pageInit() {
      // Toggle button based on role
      if (currentUser && (currentUser.role === "alumni" || currentUser.role === "mentor" || currentUser.role === "admin")) {
        const btn = document.getElementById("post-job-btn");
        if (btn) btn.classList.remove("hidden");
      }

      fetchJobs();
    }

    function debounceFetch() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        fetchJobs();
      }, 300);
    }

    async function fetchJobs() {
      const grid = document.getElementById("jobs-grid");
      const emptyState = document.getElementById("empty-state");

      grid.innerHTML = createSkeleton(4);
      emptyState.classList.add("hidden");

      const search = document.getElementById("job-search").value;
      const location = document.getElementById("job-location").value;
      const type = document.getElementById("job-type").value;

      let queryParams = new URLSearchParams();
      if (search) queryParams.append("search", search);
      if (location) queryParams.append("location", location);
      if (type) queryParams.append("type", type);

      try {
        const res = await fetch(`/api/jobs?${queryParams.toString()}`);
        const data = await res.json();

        if (data.success && data.data.length > 0) {
          grid.innerHTML = data.data.map(job => {
            const hasApplied = currentUser && job.applicants.includes(currentUser.id);
            const tagsHTML = job.tags.map(t => `
              <span class="px-2.5 py-0.5 rounded-lg text-[10px] font-semibold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400">#${t}</span>
            `).join("");

            // Color code job type badges
            let badgeColor = "";
            if (job.type === "Full-time") badgeColor = "bg-indigo-50 dark:bg-violet-950/40 text-indigo-600 dark:text-violet-400";
            else if (job.type === "Internship") badgeColor = "bg-emerald-50 dark:bg-emerald-950/20 text-emerald-600 dark:text-emerald-400";
            else if (job.type === "Part-time") badgeColor = "bg-amber-50 dark:bg-amber-950/20 text-amber-600 dark:text-amber-400";
            else badgeColor = "bg-rose-50 dark:bg-rose-950/20 text-rose-600 dark:text-rose-400";

            return `
              <div class="glass-card p-6 rounded-3xl border border-slate-200/40 dark:border-slate-800/40 flex flex-col justify-between h-80">
                <div>
                  <div class="flex items-start justify-between gap-4">
                    <div class="min-w-0">
                      <span class="inline-block px-2.5 py-0.5 rounded-lg text-[10px] font-extrabold uppercase ${badgeColor} mb-2">
                        ${job.type}
                      </span>
                      <h3 class="font-extrabold text-lg text-slate-800 dark:text-slate-100 line-clamp-1">${job.title}</h3>
                      <p class="text-xs text-indigo-600 dark:text-violet-400 font-bold mt-0.5">${job.company}</p>
                    </div>
                    <img src="${job.postedBy ? job.postedBy.avatar : 'https://via.placeholder.com/48'}" alt="Avatar" class="w-10 h-10 rounded-full border border-indigo-200 object-cover flex-shrink-0">
                  </div>

                  <p class="text-xs text-slate-400 font-semibold mt-3 flex items-center gap-1.5">
                    <i class="fa-solid fa-location-dot text-slate-400"></i> ${job.location} &bull; <i class="fa-solid fa-money-bill-wave text-slate-400"></i> ${job.salary}
                  </p>

                  <p class="text-xs text-slate-500 dark:text-slate-450 mt-3 line-clamp-2 leading-relaxed">
                    ${job.description}
                  </p>

                  <div class="flex flex-wrap gap-1.5 mt-3">
                    ${tagsHTML}
                  </div>
                </div>

                <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-850 flex items-center justify-between">
                  <div class="flex items-center gap-1">
                    <span class="text-[9px] text-slate-400 font-bold uppercase"><i class="fa-solid fa-user-tie text-slate-400 mr-0.5"></i> ${job.applicants.length} applied</span>
                  </div>

                  <div class="flex gap-2">
                    ${currentUser && (job.postedBy._id === currentUser.id || currentUser.role === "admin") ? `
                      <button onclick="handleDeleteJob('${job._id}')" class="p-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/20 rounded-xl transition">
                        <i class="fa-regular fa-trash-can text-sm"></i>
                      </button>
                    ` : ""}
                    <button onclick="handleApply('${job._id}')" ${hasApplied ? "disabled" : ""} class="px-4 py-2 text-xs font-semibold rounded-xl transition shadow-sm ${
                      hasApplied 
                        ? "bg-slate-100 dark:bg-slate-800 text-slate-400 border border-slate-200/50 dark:border-slate-800" 
                        : "bg-indigo-600 dark:bg-violet-600 hover:bg-indigo-700 dark:hover:bg-violet-700 text-white"
                    }">
                      ${hasApplied ? `<i class="fa-solid fa-check mr-1"></i> Applied` : "Apply Now"}
                    </button>
                  </div>
                </div>
              </div>
            `;
          }).join("");
        } else {
          grid.innerHTML = "";
          emptyState.classList.remove("hidden");
        }
      } catch (err) {
        console.error("Fetch jobs error:", err);
        grid.innerHTML = "";
        showToast("Error retrieving jobs openings feed", "error");
      }
    }

    function openJobModal() {
      if (!currentUser) return;
      document.getElementById("job-modal").classList.remove("hidden");
    }

    function closeJobModal() {
      document.getElementById("job-modal").classList.add("hidden");
      document.getElementById("job-form").reset();
    }

    async function submitJob(e) {
      e.preventDefault();

      const title = document.getElementById("post-title").value;
      const company = document.getElementById("post-company").value;
      const description = document.getElementById("post-desc").value;
      const location = document.getElementById("post-location").value;
      const type = document.getElementById("post-type").value;
      const salary = document.getElementById("post-salary").value;
      const tags = document.getElementById("post-tags").value;

      try {
        const res = await fetch("/api/jobs", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title, company, description, location, type, salary, tags })
        });
        const data = await res.json();

        if (data.success) {
          showToast(data.message, "success");
          closeJobModal();
          fetchJobs();
        } else {
          showToast(data.message || "Failed to post job listing", "error");
        }
      } catch (err) {
        showToast("Server connection error", "error");
      }
    }

    async function handleApply(jobId) {
      if (!currentUser) {
        showToast("Please log in to apply for job postings", "warning");
        return;
      }
      try {
        const res = await fetch(`/api/jobs/apply/${jobId}`, {
          method: "POST"
        });
        const data = await res.json();
        
        if (data.success) {
          showToast(data.message, "success");
          fetchJobs();
        } else {
          showToast(data.message || "Application failed", "error");
        }
      } catch (err) {
        showToast("Server connection error", "error");
      }
    }

    async function handleDeleteJob(jobId) {
      if (!confirm("Are you sure you want to delete this job opening?")) return;

      try {
        const res = await fetch(`/api/jobs/${jobId}`, {
          method: "DELETE"
        });
        const data = await res.json();
        
        if (data.success) {
          showToast(data.message, "success");
          fetchJobs();
        } else {
          showToast(data.message || "Delete failed", "error");
        }
      } catch (err) {
        showToast("Server connection error", "error");
      }
    }
  </script>
</body>
</html>
