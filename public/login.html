<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AlumniHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col justify-between">

  <!-- Sticky Navbar -->
  <header id="navbar-container"></header>

  <!-- Login Form Wrapper -->
  <main class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl -z-10 animate-pulse"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-violet-500/10 rounded-full blur-3xl -z-10 animate-pulse"></div>

    <div class="max-w-md w-full p-8 rounded-3xl glass shadow-2xl border border-slate-200/50 dark:border-slate-800/80 relative z-10 flex flex-col gap-6">
      <div class="text-center">
        <h2 class="text-3xl font-extrabold tracking-tight text-slate-800 dark:text-slate-100">Welcome Back</h2>
        <p class="text-xs text-slate-400 mt-2">Log in to check messages, schedules, and job openings.</p>
      </div>

      <!-- Quick credentials help card for testing -->
      <div class="p-3.5 bg-indigo-50/50 dark:bg-indigo-950/20 border border-indigo-100/50 dark:border-indigo-900/30 rounded-2xl">
        <p class="text-xs font-bold text-indigo-600 dark:text-violet-400 mb-1"><i class="fa-solid fa-circle-info mr-1"></i> Testing Credentials:</p>
        <ul class="text-[10px] text-slate-500 dark:text-slate-400 list-disc list-inside">
          <li><strong>Admin:</strong> username: <code class="bg-white dark:bg-slate-800 px-1 py-0.5 rounded">admin</code> | pass: <code class="bg-white dark:bg-slate-800 px-1 py-0.5 rounded">123456</code></li>
          <li><strong>Alumni/Mentor:</strong> email: <code class="bg-white dark:bg-slate-800 px-1 py-0.5 rounded">john@example.com</code> | pass: <code class="bg-white dark:bg-slate-800 px-1 py-0.5 rounded">password123</code></li>
        </ul>
      </div>

      <form id="login-form" onsubmit="handleLoginSubmit(event)" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Email / Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400"><i class="fa-solid fa-envelope"></i></span>
            <input type="text" id="login-email" required class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="john@example.com or admin">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="login-password" required class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm text-slate-800 dark:text-slate-200" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="w-full py-3.5 text-sm font-semibold text-white bg-indigo-600 dark:bg-violet-600 hover:bg-indigo-700 dark:hover:bg-violet-700 rounded-xl transition duration-200 shadow-md shadow-indigo-100 dark:shadow-none glow-effect mt-2">
          Log In
        </button>
      </form>

      <div class="text-center mt-2">
        <p class="text-xs text-slate-400">Don't have an account? <a href="/signup" class="text-indigo-600 dark:text-violet-400 font-semibold hover:underline">Sign up today</a></p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer id="footer-container"></footer>

  <!-- App Main Scripts -->
  <script src="/js/app.js"></script>

  <script>
    async function handleLoginSubmit(e) {
      e.preventDefault();

      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();

        if (data.success) {
          showToast("Welcome back! Redirecting...", "success");
          
          // Cache JWT token in local storage as well for APIs
          localStorage.setItem("authToken", data.token);

          // Force state update and redirect
          setTimeout(() => {
            // Re-fetch auth context and let handleRouteGuards redirect
            window.location.href = "/";
          }, 800);
        } else {
          showToast(data.message || "Invalid email or password", "error");
        }
      } catch (err) {
        showToast("Error connecting to server", "error");
      }
    }
  </script>
</body>
</html>
