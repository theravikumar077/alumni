<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Dashboard - AlumniHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

  <!-- Sticky Navbar -->
  <header id="navbar-container"></header>

  <!-- Dashboard Content -->
  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <div class="flex flex-col gap-8">
      <!-- Welcome Panel -->
      <div class="glass p-6 sm:p-8 rounded-3xl border border-slate-200/50 dark:border-slate-800/80 flex flex-col sm:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-4 text-left">
          <img id="dash-avatar" src="https://via.placeholder.com/64" alt="Avatar" class="w-16 h-16 rounded-full border-2 border-emerald-550 object-cover shadow-sm">
          <div>
            <h1 class="text-2xl font-black" id="dash-welcome">Welcome, Mentor</h1>
            <p class="text-xs text-slate-400 mt-0.5">Manage your mentoring schedule, approve session bookings, and support student roadmaps.</p>
          </div>
        </div>
        
        <div class="flex gap-3">
          <a href="/mentors" class="px-5 py-3 text-xs font-semibold text-white bg-indigo-600 dark:bg-violet-600 hover:bg-indigo-700 dark:hover:bg-violet-700 rounded-2xl transition shadow-md">
            View Mentors Board
          </a>
        </div>
      </div>

      <!-- Dashboard Sections Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Pending Bookings (Left Column) -->
        <section class="lg:col-span-6 flex flex-col gap-4">
          <h2 class="text-xl font-extrabold flex items-center gap-2"><i class="fa-regular fa-calendar-plus text-indigo-500"></i> Pending Session Requests</h2>
          
          <div class="glass-card p-6 rounded-3xl flex flex-col gap-4 min-h-[350px]">
            <div id="pending-sessions-list" class="flex flex-col gap-3">
              <!-- Loading Skeleton -->
              <div class="skeleton h-20 rounded-xl"></div>
            </div>
            
            <div id="pending-empty" class="hidden text-center py-20 flex flex-col items-center gap-3">
              <span class="text-3xl text-slate-450"><i class="fa-regular fa-bell-slash"></i></span>
              <p class="text-xs text-slate-400">All caught up! No pending session bookings.</p>
            </div>
          </div>
        </section>

        <!-- Approved / Upcoming Sessions (Right Column) -->
        <section class="lg:col-span-6 flex flex-col gap-4">
          <h2 class="text-xl font-extrabold flex items-center gap-2"><i class="fa-regular fa-calendar-check text-indigo-500"></i> Upcoming Scheduled Sessions</h2>
          
          <div class="glass-card p-6 rounded-3xl flex flex-col gap-4 min-h-[350px]">
            <div id="approved-sessions-list" class="flex flex-col gap-3">
              <!-- Loading Skeleton -->
              <div class="skeleton h-20 rounded-xl"></div>
            </div>
            
            <div id="approved-empty" class="hidden text-center py-20 flex flex-col items-center gap-3">
              <span class="text-3xl text-slate-450"><i class="fa-regular fa-clock"></i></span>
              <p class="text-xs text-slate-400">No scheduled sessions in your calendar.</p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer id="footer-container" class="mt-auto"></footer>

  <!-- App Main Scripts -->
  <script src="/js/app.js"></script>

  <script>
    function pageInit() {
      // Guard role
      if (currentUser.role !== "mentor") {
        redirectToDashboard();
        return;
      }

      document.getElementById("dash-welcome").innerText = `Welcome, ${currentUser.name}`;
      document.getElementById("dash-avatar").src = currentUser.avatar;

      fetchMentorSessions();
    }

    async function fetchMentorSessions() {
      const pendingContainer = document.getElementById("pending-sessions-list");
      const pendingEmpty = document.getElementById("pending-empty");
      const approvedContainer = document.getElementById("approved-sessions-list");
      const approvedEmpty = document.getElementById("approved-empty");

      try {
        const res = await fetch("/api/mentors/sessions");
        const data = await res.json();

        if (data.success) {
          const sessions = data.sessions;

          const pending = sessions.filter(s => s.status === "pending");
          const approved = sessions.filter(s => s.status === "accepted");

          // Render pending requests
          if (pending.length > 0) {
            pendingEmpty.classList.add("hidden");
            pendingContainer.innerHTML = pending.map(s => {
              const student = s.studentId;
              if (!student) return "";
              return `
                <div class="p-4 rounded-2xl bg-slate-50/50 dark:bg-slate-900/50 border border-slate-150/40 dark:border-slate-800 flex flex-col gap-3">
                  <div class="flex items-start justify-between gap-4">
                    <div class="flex items-center gap-3">
                      <img src="${student.avatar}" alt="Avatar" class="w-10 h-10 rounded-full object-cover">
                      <div>
                        <h4 class="font-bold text-xs text-slate-800 dark:text-slate-100">${student.name}</h4>
                        <p class="text-[9px] text-slate-400 font-semibold">${student.email}</p>
                      </div>
                    </div>
                    <span class="px-2 py-0.5 bg-amber-50 dark:bg-amber-950/20 text-amber-600 dark:text-amber-400 rounded-lg text-[9px] font-extrabold uppercase border border-amber-500/20">Pending</span>
                  </div>
                  
                  <div class="text-xs text-slate-600 dark:text-slate-350">
                    <p class="mt-1"><span class="font-bold text-slate-400">Topic:</span> "${s.topic}"</p>
                    <p class="mt-1 font-semibold text-indigo-650 dark:text-violet-400"><i class="fa-regular fa-clock mr-1"></i> ${new Date(s.date).toLocaleDateString()} &bull; ${s.time}</p>
                  </div>

                  <div class="flex gap-2 mt-2 pt-2 border-t border-slate-150/30 dark:border-slate-800/30">
                    <button onclick="respondSession('${s._id}', 'rejected')" class="flex-1 py-1.5 text-[10px] font-bold text-rose-500 bg-rose-50 dark:bg-rose-950/20 rounded-lg hover:bg-rose-100 transition">Reject</button>
                    <button onclick="respondSession('${s._id}', 'accepted')" class="flex-1 py-1.5 text-[10px] font-bold text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition">Accept</button>
                  </div>
                </div>
              `;
            }).join("");
          } else {
            pendingContainer.innerHTML = "";
            pendingEmpty.classList.remove("hidden");
          }

          // Render approved sessions
          if (approved.length > 0) {
            approvedEmpty.classList.add("hidden");
            approvedContainer.innerHTML = approved.map(s => {
              const student = s.studentId;
              if (!student) return "";
              return `
                <div class="p-4 rounded-2xl bg-slate-50/50 dark:bg-slate-900/50 border border-slate-150/40 dark:border-slate-800 flex items-center justify-between gap-4">
                  <div class="flex items-center gap-3">
                    <img src="${student.avatar}" alt="Avatar" class="w-10 h-10 rounded-full object-cover">
                    <div>
                      <h4 class="font-bold text-xs text-slate-800 dark:text-slate-100">${student.name}</h4>
                      <p class="text-[9px] text-slate-400 font-semibold">Goal: ${s.topic}</p>
                      <p class="text-[10px] text-indigo-650 dark:text-violet-400 font-semibold mt-0.5"><i class="fa-regular fa-clock mr-1"></i> ${new Date(s.date).toLocaleDateString()} &bull; ${s.time}</p>
                    </div>
                  </div>

                  <div class="flex gap-2">
                    <a href="/messages?chat=${student._id}" class="p-2 text-indigo-650 dark:text-violet-400 hover:bg-indigo-50 dark:hover:bg-violet-950/20 rounded-xl transition">
                      <i class="fa-regular fa-comment text-sm"></i>
                    </a>
                  </div>
                </div>
              `;
            }).join("");
          } else {
            approvedContainer.innerHTML = "";
            approvedEmpty.classList.remove("hidden");
          }
        }
      } catch (err) {
        console.error("Mentor sessions load error:", err);
      }
    }

    async function respondSession(sessionId, status) {
      if (!confirm(`Are you sure you want to change session status to ${status}?`)) return;

      try {
        const res = await fetch(`/api/mentors/sessions/${sessionId}/status`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status })
        });
        const data = await res.json();

        if (data.success) {
          showToast(data.message, "success");
          fetchMentorSessions();
        } else {
          showToast(data.message || "Failed to update session", "error");
        }
      } catch (err) {
        showToast("Server connection error", "error");
      }
    }
  </script>
</body>
</html>
