<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumni Dashboard - AlumniHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

  <!-- Sticky Navbar -->
  <header id="navbar-container"></header>

  <!-- Dashboard Content -->
  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <div class="flex flex-col gap-8">
      <!-- Welcome Panel -->
      <div class="glass p-6 sm:p-8 rounded-3xl border border-slate-200/50 dark:border-slate-800/80 flex flex-col sm:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-4 text-left">
          <img id="dash-avatar" src="https://via.placeholder.com/64" alt="Avatar" class="w-16 h-16 rounded-full border-2 border-indigo-505 object-cover shadow-sm">
          <div>
            <h1 class="text-2xl font-black" id="dash-welcome">Welcome, Alumni Member</h1>
            <p class="text-xs text-slate-400 mt-0.5">Post career opportunities, review applicants, and coordinate networking meetups.</p>
          </div>
        </div>
        
        <div class="flex gap-3">
          <a href="/jobs" class="px-5 py-3 text-xs font-semibold text-white bg-indigo-600 dark:bg-violet-600 hover:bg-indigo-700 dark:hover:bg-violet-700 rounded-2xl transition shadow-md">
            Manage Job Board
          </a>
        </div>
      </div>

      <!-- Dashboard Sections Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- My Job Openings & Applicants (Left Column) -->
        <section class="lg:col-span-7 flex flex-col gap-4">
          <h2 class="text-xl font-extrabold flex items-center gap-2"><i class="fa-solid fa-briefcase text-indigo-500"></i> My Job Openings & Applicants</h2>
          
          <div class="glass-card p-6 rounded-3xl flex flex-col gap-4 min-h-[400px]">
            <div id="my-jobs-list" class="flex flex-col gap-5">
              <!-- Loading Skeleton -->
              <div class="skeleton h-24 rounded-2xl"></div>
            </div>
            
            <div id="jobs-empty" class="hidden text-center py-20 flex flex-col items-center gap-3">
              <span class="text-3xl text-slate-450"><i class="fa-regular fa-folder"></i></span>
              <p class="text-xs text-slate-400">You haven't posted any job openings yet.</p>
            </div>
          </div>
        </section>

        <!-- Events Hosted Overview (Right Column) -->
        <section class="lg:col-span-5 flex flex-col gap-4">
          <h2 class="text-xl font-extrabold flex items-center gap-2"><i class="fa-regular fa-calendar-check text-indigo-500"></i> My Hosted Events</h2>
          
          <div class="glass-card p-6 rounded-3xl flex flex-col gap-4 min-h-[250px]">
            <div id="my-events-list" class="flex flex-col gap-3">
              <div class="skeleton h-20 rounded-2xl"></div>
            </div>
            
            <div id="events-empty" class="hidden text-center py-10 flex flex-col items-center gap-3">
              <span class="text-3xl text-slate-450"><i class="fa-regular fa-calendar"></i></span>
              <p class="text-xs text-slate-400">You haven't hosted any events yet.</p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer id="footer-container" class="mt-auto"></footer>

  <!-- App Main Scripts -->
  <script src="/js/app.js"></script>

  <script>
    function pageInit() {
      // Guard role
      if (currentUser.role !== "alumni" && currentUser.role !== "mentor") {
        redirectToDashboard();
        return;
      }

      document.getElementById("dash-welcome").innerText = `Welcome, ${currentUser.name}`;
      document.getElementById("dash-avatar").src = currentUser.avatar;

      fetchAlumniJobs();
      fetchAlumniEvents();
    }

    async function fetchAlumniJobs() {
      const container = document.getElementById("my-jobs-list");
      const empty = document.getElementById("jobs-empty");

      try {
        const res = await fetch("/api/jobs/my-jobs");
        const data = await res.json();

        if (data.success && data.data.length > 0) {
          empty.classList.add("hidden");
          container.innerHTML = data.data.map(job => {
            
            const applicantsHTML = job.applicants.length > 0 
              ? job.applicants.map(app => `
                  <div class="flex items-center justify-between p-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 text-xs">
                    <div class="flex items-center gap-2">
                      <img src="${app.avatar}" alt="Avatar" class="w-8 h-8 rounded-full object-cover">
                      <div>
                        <p class="font-bold text-slate-800 dark:text-slate-100">${app.name}</p>
                        <p class="text-[9px] text-slate-400 font-semibold">${app.email}</p>
                      </div>
                    </div>
                    <div class="flex gap-1.5">
                      <a href="/profile?id=${app._id}" class="px-2.5 py-1 text-[10px] bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-350 rounded-lg hover:underline">Profile</a>
                      <a href="/messages?chat=${app._id}" class="px-2.5 py-1 text-[10px] bg-indigo-50 dark:bg-violet-950/40 text-indigo-650 dark:text-violet-400 rounded-lg hover:bg-indigo-100">Chat</a>
                    </div>
                  </div>
                `).join("")
              : `<p class="text-[11px] text-slate-400 italic px-2">No applications submitted yet.</p>`;

            return `
              <div class="p-5 rounded-2xl border border-slate-200/50 dark:border-slate-800 bg-slate-50/20 dark:bg-slate-900/10 flex flex-col gap-3">
                <div class="flex justify-between items-start">
                  <div>
                    <h3 class="font-extrabold text-sm text-slate-850 dark:text-slate-100">${job.title}</h3>
                    <p class="text-[10px] text-indigo-650 dark:text-violet-400 font-semibold">${job.type} &bull; ${job.location}</p>
                  </div>
                  <span class="px-2 py-0.5 text-[9px] font-extrabold bg-slate-100 dark:bg-slate-800 text-slate-500 rounded uppercase border border-slate-200/50 dark:border-slate-800">${job.status}</span>
                </div>
                
                <div class="mt-2">
                  <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Applicants (${job.applicants.length})</h4>
                  <div class="flex flex-col gap-2">
                    ${applicantsHTML}
                  </div>
                </div>
              </div>
            `;
          }).join("");
        } else {
          container.innerHTML = "";
          empty.classList.remove("hidden");
        }
      } catch (err) {
        console.error("Alumni jobs fetch error:", err);
      }
    }

    async function fetchAlumniEvents() {
      const container = document.getElementById("my-events-list");
      const empty = document.getElementById("events-empty");

      try {
        const res = await fetch("/api/events");
        const data = await res.json();

        if (data.success) {
          // Filter events hosted by viewedUserId
          const myEvents = data.data.filter(e => e.organizer && (e.organizer._id === currentUser.id || e.organizer._id === currentUser._id));
          
          if (myEvents.length > 0) {
            empty.classList.add("hidden");
            container.innerHTML = myEvents.map(e => `
              <div class="p-4 rounded-xl bg-slate-50/50 dark:bg-slate-900/50 border border-slate-150/40 dark:border-slate-800 flex justify-between items-center text-xs">
                <div>
                  <h3 class="font-extrabold text-slate-850 dark:text-slate-100">${e.title}</h3>
                  <p class="text-[10px] text-slate-400 mt-0.5"><i class="fa-regular fa-calendar mr-1"></i> ${new Date(e.date).toLocaleDateString()} &bull; ${e.time}</p>
                </div>
                <div class="text-right">
                  <span class="px-2.5 py-1 text-[10px] font-bold bg-indigo-50 dark:bg-violet-950/40 text-indigo-650 dark:text-violet-400 rounded-lg">${e.rsvps.length} RSVP'd</span>
                </div>
              </div>
            `).join("");
          } else {
            container.innerHTML = "";
            empty.classList.remove("hidden");
          }
        }
      } catch (err) {
        console.error("Alumni events fetch error:", err);
      }
    }
  </script>
</body>
</html>
